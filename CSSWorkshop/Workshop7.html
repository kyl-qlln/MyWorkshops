<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style7.css">
</head>

<body>

    <main class="container">

        <button type="button" class="back-button" onclick="location.href='../index.html';">Back</button>
        <h1 class="title center" center>Parent Teacher Conference Form</h1>
        <p class="description center">Please fill out the form below to help schedule your parent-teacher conference.
        </p>

        <form action="">
            <fieldset>
                <legend>Student Information</legend>
                <label for="student-name">Full Name: </label>
                <input required type="text" name="student-name" id="student-name" placeholder="E.g., Jane Doe">

                <label for="grade">Student Grade: </label>
                <input required type="number" name="grade" id="grade" placeholder="E.g., 4">
            </fieldset>

            <fieldset>
                <legend>Parent/Guardian Information</legend>
                <label for="parent-name">Parent/Guardian Name: </label>
                <input required type="text" name="parent-name" id="parent-name" placeholder="E.g., Nancy Doe">
            </fieldset>

            <fieldset>
                <legend>Preferred Contact Method </legend>

                <label for="email" class="contact-method">Email: </label>
                <input type="radio" name="contact-method" id="email" value="email" class="contact-method-radio-btn"
                    checked>
                <label for="phone" class="contact-method">Phone: </label>
                <input type="radio" name="contact-method" id="phone" value="phone" class="contact-method-radio-btn">
            </fieldset>

            <fieldset>
                <legend>Additional Notes</legend>

                <label for="notes">Any specific concerns or topics you'd like to discuss?</label>
                <textarea name="notes" id="notes" rows="4" cols="50"></textarea>
            </fieldset>


            <button type="submit" class="submit-btn">Submit Form</button>


        </form>



    </main>

</body>

</html>
